<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Realtime Chat</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>

    :root{
      --brand: #8b5cf6;
      --brand-2: #38bdf8;

      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #f1f5f9;

      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;

      --gradient-brand: linear-gradient(135deg,#8b5cf6,#38bdf8);

      --bubble-me: linear-gradient(135deg,#8b5cf6,#6d28d9);
      --bubble-them: #ffffff;

      --shadow-soft: 0 10px 30px rgba(0,0,0,.08);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      height:100%;
    }

    body{
      margin:0;
      font-family:'Inter',sans-serif;
      background:var(--bg);

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;
    }

    .chat{
      width:50%;
      height:95vh;

      background:var(--surface);

      border-radius:24px;

      overflow:hidden;

      display:flex;
      flex-direction:column;

      border:1px solid var(--border);

      box-shadow:var(--shadow-soft);
    }

    /* HEADER */

    .chat-header{
      display:flex;
      align-items:center;
      gap:12px;

      padding:16px 20px;

      border-bottom:1px solid var(--border);

      background:var(--surface);
    }

    .avatar img{
      width:42px;
      height:42px;

      border-radius:50%;
      object-fit:cover;
    }

    .who{
      flex:1;
    }

    .name{
      font-weight:600;
      color:var(--text);
    }

    .status{
      font-size:.8rem;
      color:#22c55e;
    }

    .icon-btn{
      width:38px;
      height:38px;

      border:none;
      border-radius:12px;

      background:transparent;

      display:grid;
      place-items:center;

      color:var(--muted);

      cursor:pointer;
    }

    .icon-btn:hover{
      background:var(--surface-2);
    }

    /* MESSAGES */

    .messages{
      flex:1;

      overflow-y:auto;

      padding:20px;

      display:flex;
      flex-direction:column;

      gap:14px;

      background:var(--bg);
    }

    .messages::-webkit-scrollbar{
      width:7px;
    }

    .messages::-webkit-scrollbar-thumb{
      background:#cbd5e1;
      border-radius:999px;
    }

    .day-divider{
      align-self:center;

      font-size:.75rem;

      color:var(--muted);

      padding:6px 12px;

      border-radius:999px;

      background:white;

      border:1px solid var(--border);
    }

    .msg{
      display:flex;
      gap:8px;

      max-width:75%;
    }

    .msg.them{
      align-self:flex-start;
    }

    .msg.me{
      align-self:flex-end;
      flex-direction:row-reverse;
    }

    .msg img.av{
      width:28px;
      height:28px;

      border-radius:50%;
      align-self:flex-end;
    }

    .bubble{
      padding:12px 14px;

      border-radius:18px;

      font-size:.93rem;

      line-height:1.4;

      box-shadow:var(--shadow-soft);
    }

    .msg.them .bubble{
      background:var(--bubble-them);
      color:var(--text);

      border-bottom-left-radius:6px;
    }

    .msg.me .bubble{
      background:var(--bubble-me);
      color:white;

      border-bottom-right-radius:6px;
    }

    .meta{
      font-size:.7rem;
      color:var(--muted);

      margin-top:5px;
    }

    .msg.me .meta{
      text-align:right;
    }

    /* COMPOSER */

    .composer{
      padding:14px 18px;

      border-top:1px solid var(--border);

      background:var(--surface);
    }

    .composer-inner{
      display:flex;
      align-items:flex-end;
      gap:8px;

      background:var(--surface-2);

      border-radius:18px;

      border:1px solid var(--border);

      padding:8px 10px;
    }

    textarea{
      flex:1;

      border:none;
      outline:none;

      resize:none;

      background:transparent;

      max-height:140px;

      font-size:.95rem;

      font-family:inherit;

      padding:8px 4px;
    }

    .send-btn{
      width:42px;
      height:42px;

      border:none;
      border-radius:14px;

      background:var(--gradient-brand);

      color:white;

      display:grid;
      place-items:center;

      cursor:pointer;
    }

    /* MOBILE */

    @media(max-width:900px){

      .chat{
        width:100%;
        height:100vh;
        border-radius:0;
      }

    }

  </style>
</head>

<body>

  <section class="chat">

    <!-- HEADER -->

    <header class="chat-header">

      <div class="avatar">
        <img src="https://i.pravatar.cc/80?img=47">
      </div>

      <div class="who">
        <div class="name">
          {{ other_user.username }}
        </div>

        <div class="status">
          <i class="bi bi-circle-fill" style="font-size:.5rem"></i>
          Active now
        </div>
      </div>

      <button class="icon-btn">
        <i class="bi bi-telephone"></i>
      </button>

      <button class="icon-btn">
        <i class="bi bi-camera-video"></i>
      </button>

    </header>

    <!-- MESSAGES -->

    <div class="messages" id="messages">

      <div class="day-divider">
        Today
      </div>

    </div>

    <!-- COMPOSER -->

    <form class="composer" id="composer">

      <div class="composer-inner">

        <button type="button" class="icon-btn">
          <i class="bi bi-paperclip"></i>
        </button>

        <textarea
          id="input"
          rows="1"
          placeholder="Write a message..."
        ></textarea>

        <button type="submit" class="send-btn">
          <i class="bi bi-send-fill"></i>
        </button>

      </div>

    </form>

  </section>

  <script>

    const receiverId = "{{ id }}";
    const currentUserId = "{{ request.user.id }}";

    const wsScheme =
      window.location.protocol === "https:" ? "wss" : "ws";

    const socket = new WebSocket(
      wsScheme +
      "://" +
      window.location.host +
      "/ws/chat/" +
      receiverId +
      "/"
    );

    const messages = document.getElementById("messages");
    const composer = document.getElementById("composer");
    const input = document.getElementById("input");

    // ======================
    // SOCKET CONNECT
    // ======================

    socket.onopen = function () {
      console.log("Connected");
    };

    // ======================
    // RECEIVE MESSAGE
    // ======================

    socket.onmessage = function (e) {

      const data = JSON.parse(e.data);

      console.log(data);

      // ======================
      // CHAT HISTORY
      // ======================

      if (data.message_history) {

        data.message_history.forEach(msg => {

          const isMe =
            String(msg.sender_id) === String(currentUserId);

          const messageHTML = `

            <div class="msg ${isMe ? 'me' : 'them'}">

              ${!isMe ? `
                <img class="av"
                  src="https://i.pravatar.cc/60?img=47">
              ` : ''}

              <div>

                <div class="bubble">
                  ${msg.message}
                </div>

                <div class="meta">
                  ${msg.timestamp}
                </div>

              </div>

            </div>

          `;

          messages.insertAdjacentHTML(
            "beforeend",
            messageHTML
          );

        });

        messages.scrollTop = messages.scrollHeight;

        return;
      }

      // ======================
      // LIVE MESSAGE
      // ======================

      const isMe =
        String(data.sender_id) === String(currentUserId);

      const messageHTML = `

        <div class="msg ${isMe ? 'me' : 'them'}">

          ${!isMe ? `
            <img class="av"
              src="https://i.pravatar.cc/60?img=47">
          ` : ''}

          <div>

            <div class="bubble">
              ${data.message}
            </div>

            <div class="meta">
              ${data.timestamp}
            </div>

          </div>

        </div>

      `;

      messages.insertAdjacentHTML(
        "beforeend",
        messageHTML
      );

      messages.scrollTop = messages.scrollHeight;
    };



    composer.addEventListener("submit", function (e) {

      e.preventDefault();

      const message = input.value.trim();

      if (!message) return;

      socket.send(JSON.stringify({
        message: message
      }));

      input.value = "";
      input.style.height = "auto";
    });

   
    input.addEventListener("input", () => {

      input.style.height = "auto";

      input.style.height =
        Math.min(input.scrollHeight, 140) + "px";
    });



    socket.onclose = function () {
      console.log("Disconnected");
    };

  </script>

</body>
</html>
