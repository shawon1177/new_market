<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<title>Centered Chat List</title>

<style>
:root {
  --border: #e6e8ef;
  --surface: #ffffff;
  --surface-2: #f1f3f9;
  --muted: #64748b;
  --brand: #8b5cf6;
  --gradient-soft: linear-gradient(135deg, #ede9fe, #e0f2fe);
}

/* PAGE CENTER */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f6f7fb;
  font-family: Arial, sans-serif;
}

/* MAIN PANEL (NOT SIDEBAR) */
.chat-panel {
  width: min(70vw, 1100px);
  height: 85vh;

  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;

  display: flex;
  flex-direction: column;

  box-shadow: 0 20px 50px -20px rgba(0,0,0,.2);
  overflow: hidden;
}

/* HEADER */
.panel-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
}

.brand-mark {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: linear-gradient(135deg,#8b5cf6,#38bdf8);
  display: grid;
  place-items: center;
  color: #fff;
}

.search {
  margin-top: 12px;
  position: relative;
}

.search input {
  width: 100%;
  padding: 10px 12px 10px 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface-2);
  outline: none;
}

.search i {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
}

/* FILTERS */
.filter-tabs {
  display: flex;
  gap: 6px;
  padding: 10px;
  overflow-x: auto;
}

.filter-tabs button {
  border: 0;
  background: transparent;
  padding: 6px 12px;
  font-size: 12px;
  border-radius: 999px;
  color: var(--muted);
  white-space: nowrap;
  cursor: pointer;
}

.filter-tabs button.active {
  background: var(--gradient-soft);
  color: black;
}

/* SCROLLABLE LIST */
.conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* ITEM */
.conv {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.conv:hover {
  background: var(--surface-2);
}

.avatar img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
}

.conv-meta {
  flex: 1;
}

.name {
  font-weight: 600;
  font-size: 14px;
}

.preview {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.time {
  font-size: 11px;
  color: var(--muted);
}
</style>
</head>

<body>

<div class="chat-panel">


  <div class="panel-header">
    <div class="brand">
      <span class="brand-mark"><i class="bi bi-chat-heart-fill"></i></span>
      Pulse
    </div>

    <div class="search">
      <i class="bi bi-search"></i>
      <input type="text" placeholder="Search conversations…">
    </div>
  </div>


  <div class="filter-tabs">
    <button class="active">All</button>
    <button>Unread</button>
    <button>Groups</button>
    <button>Archived</button>
  </div>


  <div class="conv-list">

    {% for n in chats %}
      
     <a href="{% url 'listings:messages' n.receiver.id %}" style="text-decoration:none; color:inherit;">
  
  <div class="conv">
    <div class="avatar">
      <img src="https://i.pravatar.cc/80?img=1">
    </div>

    <div class="conv-meta">
      <div class="d-flex justify-content-between">
        <div class="name">{{ n.receiver.username }}</div>
        <div class="time">{{ n.timestamp|date:"H:i" }}</div>
      </div>

      <div class="preview">
        {{ n.message|truncatewords:5 }}
      </div>
    </div>
  </div>

</a>


    {% endfor %}

 


  </div>

</div>

</body>
</html>
