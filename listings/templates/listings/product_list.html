<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketplace</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Loader CSS -->
    <style>
        #loader {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>

</head>

<body class="bg-light">

<!-- LOADER -->
<div id="loader">
    <div class="spinner-border text-primary"></div>
</div>

{% if request.user.is_authenticated %}
<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="{% url 'listings:dashboard' %}">
            Marketplace
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">

            <!-- Search -->
            <form method="GET" action="{% url 'listings:dashboard' %}" class="mx-auto w-50">
                <input type="text" name="q"
                       class="form-control rounded-pill"
                       placeholder="Search products...">
            </form>

            <!-- Menu -->
            <div class="d-flex gap-2 mt-2 mt-lg-0">

                <a href="{% url 'listings:dashboard' %}" class="btn btn-sm btn-outline-dark">
                    Products
                </a>

                <a href="{% url 'listings:add_product' %}" class="btn btn-sm btn-success">
                    + Add
                </a>

                <a href="{% url 'profile' %}" class="btn btn-sm btn-secondary">
                    Profile
                </a>

            </div>

        </div>
    </div>
</nav>
{% endif %}

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Loader Script -->
<script>
    window.onload = function () {
        document.getElementById("loader").style.display = "none";
    };
</script>

</body>
</html>
