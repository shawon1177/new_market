<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alex Rivera — Product Designer & Developer</title>
  <meta name="description" content="Profile of Alex Rivera, a product designer and front-end developer." />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --brand: #8b5cf6;
      --brand-2: #38bdf8;
      --brand-3: #fb923c;
      --bg: #faf8ff;
      --fg: #1a1530;
      --muted: #6b6890;
      --border: #ece8f5;
      --gradient-brand: linear-gradient(135deg, #8b5cf6, #38bdf8);
      --gradient-soft: linear-gradient(135deg, #fde4cf, #e3d4ff, #d3e6ff);
      --gradient-cover: linear-gradient(135deg, #fcd5b6 0%, #c8b6ff 45%, #a5c8ff 100%);
      --shadow-elegant: 0 20px 50px -20px rgba(139, 92, 246, .35);
      --shadow-soft: 0 10px 30px -15px rgba(26, 21, 48, .2);
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    .text-muted-2 { color: var(--muted) !important; }

    .cover {
      height: 12rem;
      background: var(--gradient-cover);
      position: relative;
      overflow: hidden;
    }
    .cover::after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(to top, var(--bg), transparent 60%);
    }
    @media (min-width: 576px) { .cover { height: 16rem; } }
    @media (min-width: 768px) { .cover { height: 20rem; } }

    .avatar {
      width: 8rem; height: 8rem;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--bg);
      box-shadow: var(--shadow-elegant);
    }
    @media (min-width: 576px) { .avatar { width: 10rem; height: 10rem; } }
    @media (min-width: 768px) { .avatar { width: 12rem; height: 12rem; } }

    .status-dot {
      width: 1rem; height: 1rem;
      background: #10b981;
      border-radius: 50%;
      border: 4px solid var(--bg);
      position: absolute; bottom: .5rem; right: .5rem;
    }

    .btn-brand {
      background: var(--gradient-brand);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: .5rem 1.25rem;
      font-weight: 500;
    }
    .btn-brand:hover { color: #fff; opacity: .92; }
    .btn-pill { border-radius: 999px; }

    .card-soft {
      border: 1px solid var(--border);
      border-radius: 1rem;
      background: #fff;
    }
    .stat-value { font-size: 1.25rem; font-weight: 700; }
    @media (min-width: 576px) { .stat-value { font-size: 1.875rem; } }

    .badge-soft {
      background: #f1ecff;
      color: #5b3fc9;
      font-weight: 500;
      border-radius: 999px;
      padding: .4rem .8rem;
    }

    .social-link {
      display: flex; align-items: center; gap: .5rem;
      border: 1px solid var(--border);
      border-radius: .75rem;
      padding: .65rem .85rem;
      color: var(--fg);
      text-decoration: none;
      font-size: .9rem;
      transition: background .2s, border-color .2s;
    }
    .social-link:hover { background: #f6f2ff; border-color: transparent; color: var(--fg); }

    .project-card {
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow: hidden;
      background: #fff;
      transition: box-shadow .25s, transform .25s;
    }
    .project-card:hover { box-shadow: var(--shadow-soft); transform: translateY(-2px); }
    .project-cover { height: 8rem; background: var(--gradient-soft); }
    @media (min-width: 576px) { .project-cover { height: 10rem; } }

    .meta-row { color: var(--muted); font-size: .9rem; }
    .meta-row a { color: var(--muted); text-decoration: none; }
    .meta-row a:hover { color: var(--fg); }

    h1, h2, h3 { letter-spacing: -.01em; }
  </style>
</head>
<body>

  <!-- Cover -->
  <section class="cover"></section>

  <div class="container" style="max-width: 72rem;">
    <!-- Header -->
    <header class="d-flex flex-column flex-md-row align-items-center align-items-md-end text-center text-md-start gap-3 gap-md-4" style="margin-top: -5rem;">
      <div class="position-relative">
        <img src="{{ profile.image.url }}" alt="Alex Rivera" class="avatar" />
        <span class="status-dot"></span>
      </div>

      <div class="flex-grow-1 pb-md-3 w-100">
        <div class="d-flex flex-column flex-md-row justify-content-md-between align-items-center gap-2">
          <div>
            <h1 class="fs-2 fw-bold mb-1">{{user_obj.username}}</h1>
            <p class="text-muted-2 mb-0">{{user_obj.email}}</p>
          </div>
            <div class="d-flex flex-wrap justify-content-center justify-content-md-end gap-2">
                <a href="{% url 'listings:messages' user_obj.id %}" class="btn btn-outline-secondary btn-pill">
                  <i class="bi bi-envelope me-1"></i> Message
                </a>
            </div>


        <div class="meta-row mt-3 d-flex flex-wrap justify-content-center justify-content-md-start gap-3">
          <span><i class="bi bi-geo-alt me-1"></i>Dhaka, Bangladesh</span>
          <span><i class="bi bi-calendar3 me-1"></i>Joined March 2021</span>
        </div>
      </div>
    </header>



      </div>



  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
