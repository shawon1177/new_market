{% extends 'accounts/base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">Login</h2>

<form method="POST">
    {% csrf_token %}

    <input name="email" placeholder="Email" class="w-full p-3 border mb-3">

  
    <div class="relative mb-3">
        <input id="loginPassword" name="password" type="password"
               placeholder="Password"
               class="w-full p-3 border pr-10">

        <button type="button"
                onclick="togglePassword('loginPassword', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500">

            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>

        </button>
    </div>

    <button class="w-full bg-blue-600 text-white p-3">Login</button>
</form>



<div class="mt-3 text-sm text-center">
    <a href="{% url 'forgot' %}" class="text-blue-500">Forgot Password?</a>
    <p>
        Don’t have an account?
        <a href="{% url 'register' %}" class="text-blue-600">Register</a>
    </p>
</div>

</div>

<script>
function togglePassword(fieldId) {
    const input = document.getElementById(fieldId);
    input.type = (input.type === "password") ? "text" : "password";
}
</script>

{% endblock %}
