{% extends 'accounts/base.html' %}
{% block content %}


<div class="max-w-md mx-auto bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">Login</h2>

<form method="POST">
    {% csrf_token %}

    <input name="email" placeholder="Email" class="w-full p-3 border mb-3">
    <input name="password" type="password" placeholder="Password" class="w-full p-3 border mb-3">

    <button class="w-full bg-blue-600 text-white p-3">Login</button>
</form>
{% if messages %}
<div class="mb-3">
    {% for message in messages %}
        <div class="p-3 bg-red-100 text-red-700 rounded">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}

<div class="mt-3 text-sm text-center">

    <p class="text-sm mt-3 ">
        <a href="{% url 'forgot' %}" class="text-blue-500">Forgot Password?</a>
    Don’t have an account?
    <a href="{% url 'register' %}" class="text-blue-600">Register</a>
</p>
</div>

</div>


{% endblock %}
