{% extends "accounts/base.html" %}

{% block content %}
<h2>Login</h2>

<form method="POST">
  {% csrf_token %}

  <input type="email" name="email" placeholder="Email">
  <input type="password" name="password" placeholder="Password">

  <button type="submit">Login</button>
</form>
<a href="/accounts/forgot/">
    Forgot Password?
</a>
{% endblock %}
