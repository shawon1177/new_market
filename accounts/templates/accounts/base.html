<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketplace</title>

    <!-- Tailwind (keep your design same) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap (only responsiveness helpers) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- GLOBAL MOBILE SCALE FIX -->
    <style>
        html {
            font-size: 16px;
        }

        @media (max-width: 768px) {
            html {
                font-size: 18px; /* 👈 mobile text bigger */
            }

            .text-sm {
                font-size: 1rem !important;
            }

            .text-xs {
                font-size: 0.95rem !important;
            }
        }

        /* GLOBAL LOADER */
        #globalLoader {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }

        /* button click loader effect */
        .loading {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>

<body class="bg-gray-100">

<!-- GLOBAL LOADER -->
<div id="globalLoader">
    <div class="spinner-border text-primary"></div>
</div>

{% if request.user.is_authenticated %}
<div class="bg-white shadow-md sticky top-0 z-50">

    <div class="flex flex-col md:flex-row md:justify-between md:items-center px-3 py-3 gap-3">

        <!-- LOGO -->
        <a href="{% url 'listings:dashboard' %}"
           class="font-bold text-lg md:text-xl">
            Marketplace
        </a>

        <!-- SEARCH -->
        <form method="GET" action="{% url 'listings:dashboard' %}"
              class="w-full md:w-1/2">
            <input type="text"
                   name="q"
                   placeholder="Search products..."
                   class="w-full border rounded-full px-4 py-2 text-base">
        </form>

        <!-- MENU -->
        <div class="flex items-center justify-between md:justify-end gap-3 text-base">

            <a href="{% url 'listings:dashboard' %}">Products</a>

            <a href="{% url 'listings:add_product' %}"
               class="bg-green-500 text-white px-3 py-2 rounded text-base">
                + Add
            </a>

            <a href="{% url 'profile' %}">
                <div class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center text-lg">
                    ?
                </div>
            </a>

        </div>

    </div>

</div>
{% endif %}

<div class="p-3 md:p-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // GLOBAL PAGE LOADER
    window.onload = function () {
        document.getElementById("globalLoader").style.display = "none";
    };

    // GLOBAL BUTTON LOADER (click anywhere form submit)
    document.addEventListener("submit", function () {
        document.getElementById("globalLoader").style.display = "flex";
    });
</script>

</body>
</html>
