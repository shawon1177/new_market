<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

{% if request.user.is_authenticated %}
<div class="bg-white shadow-md sticky top-0 z-50">

    <div class="flex justify-between items-center px-4 py-3">

        <!-- LOGO -->
        <a href="{% url 'listings:dashboard' %}" class="font-bold text-lg">
            Marketplace
        </a>

        <!-- GLOBAL SEARCH (ONLY ONE) -->
        <form method="GET" action="{% url 'listings:dashboard' %}" class="w-1/2">
            <input type="text"
                   name="q"
                   placeholder="Search products..."
                   class="w-full border rounded-full px-4 py-1 text-sm">
        </form>

        <!-- MENU -->
        <div class="flex items-center gap-4">

            <a href="{% url 'listings:dashboard' %}" class="text-sm">Products</a>

            <a href="{% url 'listings:add_product' %}"
               class="bg-green-500 text-white px-3 py-1 rounded text-sm">
                + Add
            </a>

            <a href="{% url 'profile' %}">
                <div class="w-9 h-9 rounded-full bg-gray-300 flex items-center justify-center">
                    👤
                </div>
            </a>

        </div>

    </div>

</div>
{% endif %}

<!-- CONTENT -->
<div class="p-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
