<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>

    <!-- Tailwind (keep your design same) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons (for clean search icon) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        html { font-size: 16px; }

        @media (max-width: 768px) {
            html { font-size: 18px; }
        }

        /* GLOBAL LOADER */
        #globalLoader {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            backdrop-filter: blur(2px);
        }

        .btn-loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>

<body class="bg-gray-100">

<!-- GLOBAL LOADER -->
<div id="globalLoader">
    <div class="text-center">
        <div class="spinner-border text-success"></div>
        <div class="mt-2 text-sm">Loading...</div>
    </div>
</div>

{% if request.user.is_authenticated %}

<!-- NAVBAR -->
<div class="bg-white shadow-md sticky top-0 z-50 w-full">

    <!-- MAIN ROW -->
    <div class="container-fluid px-3 py-3">

        <div class="d-flex align-items-center justify-content-between gap-3">

            <!-- LEFT: LOGO -->
            <a href="{% url 'listings:dashboard' %}"
               class="fw-bold fs-5 text-dark text-decoration-none flex-shrink-0">
                Marketplace
            </a>

            <!-- CENTER: SEARCH (DESKTOP ONLY) -->
            <div class="d-none d-md-flex flex-grow-1 mx-3">

                <form method="GET"
                      action="{% url 'listings:dashboard' %}"
                      class="w-100">

                    <input type="text"
                           name="q"
                           placeholder="Search products..."
                           class="form-control rounded-pill px-3 py-2">
                </form>

            </div>

            <!-- RIGHT: ACTIONS -->
            <div class="d-flex align-items-center gap-3 flex-shrink-0">

                <!-- MOBILE SEARCH ICON -->
                <button class="btn btn-sm d-md-none"
                        onclick="toggleMobileSearch()">
                    <i class="bi bi-search fs-5"></i>
                </button>

                <a href="{% url 'listings:dashboard' %}"
                   class="text-decoration-none text-dark d-none d-sm-block">
                    Products
                </a>

                <a href="{% url 'listings:add_product' %}"
                   class="btn btn-success btn-sm px-3">
                    + Add
                </a>

                <!-- PROFILE -->
                <a href="{% url 'profile' %}">
                    <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center"
                         style="width:40px; height:40px;">
                        <span class="text-white">?</span>
                    </div>
                </a>

            </div>

        </div>

    </div>

    <!-- MOBILE SEARCH -->
<!-- MOBILE SEARCH -->
<div id="mobileSearchWrap" class="d-md-none px-3 pb-3 d-none mt-2">

    <form method="GET"
          action="{% url 'listings:dashboard' %}">

        <input type="text"
               id="mobileSearchInput"
               name="q"
               placeholder="Search products..."
               class="form-control rounded-pill">

    </form>

</div>

</div>
    <!-- MOBILE SEARCH BOX -->
    <form id="mobileSearch"
          method="GET"
          action="{% url 'listings:dashboard' %}"
          class="hidden md:hidden px-3 pb-3">

        <input type="text"
               name="q"
               placeholder="Search products..."
               class="w-full border rounded-full px-4 py-2 text-base focus:outline-none focus:ring-2 focus:ring-green-400">
    </form>

</div>

{% endif %}

<!-- PAGE CONTENT -->
<div class="p-3 md:p-4">
    {% block content %}{% endblock %}
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // hide loader
    window.addEventListener("load", function () {
        document.getElementById("globalLoader").style.display = "none";
    });

    // mobile search toggle
    function toggleMobileSearch() {
        document.getElementById("mobileSearch").classList.toggle("hidden");
    }

    // form loading effect
    document.querySelectorAll("form").forEach(form => {
        form.addEventListener("submit", function () {

            const btn = form.querySelector("button");

            if (btn) {
                btn.classList.add("btn-loading");
                btn.innerHTML = `
                    <span class="spinner-border spinner-border-sm"></span> Loading
                `;
            }

            document.getElementById("globalLoader").style.display = "flex";
        });
    });
</script>

</body>
</html>
