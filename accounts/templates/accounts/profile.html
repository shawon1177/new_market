{% extends 'accounts/base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center">
<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

<h2 class="text-2xl font-bold mb-4">Profile</h2>

<p><b>Email:</b> {{ request.user.email }}</p>
<p><b>Username:</b> {{ request.user.username }}</p>
<p class="mt-3">Bio: {{ profile.bio }}</p>
<a href="{% url 'listings:cart' %}"
   class="block mt-3 text-center bg-blue-500 text-white p-2 rounded">
   My Cart
</a>
<a href="/accounts/logout/" class="block mt-5 text-center bg-red-500 text-white p-2 rounded">Logout</a>

</div>
</div>

{% endblock %}
