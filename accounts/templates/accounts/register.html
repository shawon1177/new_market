{% extends 'accounts/base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">

<h2 class="text-xl font-bold mb-4">Register</h2>

<form method="POST">
    {% csrf_token %}

    <input name="username" placeholder="Username" class="w-full p-3 border mb-3">
    <input name="email" placeholder="Email" class="w-full p-3 border mb-3">
    <input name="password" type="password" placeholder="Password" class="w-full p-3 border mb-3">

    <button class="w-full bg-green-600 text-white p-3">Register</button>
</form>
{% if messages %}
<div class="mb-3">
    {% for message in messages %}
        <div class="
            p-3 rounded text-sm
            {% if message.tags == 'error' %}
                bg-red-100 text-red-700
            {% else %}
                bg-green-100 text-green-700
            {% endif %}
        ">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}
<p class="text-sm mt-3 text-center">
    Already have an account?
    <a href="{% url 'login' %}" class="text-blue-600">Login</a>
</p>

</div>

{% endblock %}
