{% extends 'accounts/base.html' %}
{% block title %}Register{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">

<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

<h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

<p id="regMsg" class="text-red-500 mb-3 text-center"></p>

<form id="registerForm">

    {% csrf_token %}

    <input class="w-full p-3 mb-3 border rounded"
           name="username"
           placeholder="Username"
           required>

    <input class="w-full p-3 mb-3 border rounded"
           name="email"
           placeholder="Email"
           type="email"
           required>

    <input class="w-full p-3 mb-3 border rounded"
           name="password"
           placeholder="Password"
           type="password"
           required>

    <button class="w-full bg-black text-white p-3 rounded">
        Register
    </button>

</form>


<a href="/accounts/login/"
   class="block text-center mt-4 text-blue-500 hover:underline">
   Already have an account? Login
</a>

</div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);

    const res = await fetch("/accounts/register/", {
        method: "POST",
        body: formData,
        credentials: "same-origin",
    });

    const msgBox = document.getElementById("regMsg");

    if (res.redirected) {
        window.location.href = res.url;
        return;
    }

    const text = await res.text();

    msgBox.innerText = "Registration failed. Please check input or CSRF error.";
    console.log("Server response:", text);
});
</script>

{% endblock %}
