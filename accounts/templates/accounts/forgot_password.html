{% extends 'accounts/base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
<h2 class="text-xl font-bold mb-4">Forgot Password</h2>

<form method="POST">
    {% csrf_token %}

    <input name="email" placeholder="Enter email" class="w-full p-3 border mb-3">

    <button class="w-full bg-yellow-600 text-white p-3">Send OTP</button>
</form>
</div>

{% endblock %}
